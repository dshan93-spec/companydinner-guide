<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오늘 회식 안내</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: #f7f7f7; color: #222; line-height: 1.65; }
    .wrap { max-width: 760px; margin: 24px auto; padding: 24px; background: white; border-radius: 18px; box-shadow: 0 8px 28px rgba(0,0,0,.08); }
    h1 { margin-top: 0; color: #b33; }
    h2 { margin-top: 28px; }
    .card { padding: 16px; border: 1px solid #eee; border-radius: 12px; margin: 14px 0; background: #fffaf7; }
    .btn { display: inline-block; margin: 6px 8px 6px 0; padding: 10px 14px; border-radius: 10px; background: #0b63ce; color: white; text-decoration: none; }
    .note { color: #666; font-size: .95em; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>오늘 회식 안내</h1>
    <div class="card">
      <p><strong>시간:</strong> 오늘 오후 5시</p>
      <p><strong>장소:</strong> 대한민국삼겹살 기흥구청점</p>
      <p><strong>주소:</strong> 경기 용인시 기흥구 관곡로64번길 14-8</p>
      <p><strong>주차:</strong> 주차 가능 장소 우선 기준으로 선정</p>
    </div>

    <h2>추천 메뉴</h2>
    <ul>
      <li><strong>메인 메뉴:</strong> 생삼겹살</li>
      <li><strong>추천 추가:</strong> 숙성목살, 김치찌개, 볶음밥</li>
      <li><strong>주문 예시:</strong> 생삼겹살 중심으로 주문 후 인원에 따라 목살, 찌개, 볶음밥 추가</li>
    </ul>

    <h2>찾아오는 길</h2>
    <p>
      <a class="btn" href="https://maps.google.com/?q=%EB%8C%80%ED%95%9C%EB%AF%BC%EA%B5%AD%EC%82%BC%EA%B2%B9%EC%82%B4+%EA%B8%B0%ED%9D%A5%EA%B5%AC%EC%B2%AD%EC%A0%90" target="_blank" rel="noopener">Google 지도 열기</a>
      <a class="btn" href="https://map.naver.com/v5/search/%EB%8C%80%ED%95%9C%EB%AF%BC%EA%B5%AD%EC%82%BC%EA%B2%B9%EC%82%B4%20%EA%B8%B0%ED%9D%A5%EA%B5%AC%EC%B2%AD%EC%A0%90" target="_blank" rel="noopener">네이버 지도 열기</a>
    </p>

    <p class="note">참석 전 예약 및 주차 가능 여부는 매장에 최종 확인하는 것을 권장합니다.</p>
  </main>
</body>
</html>
